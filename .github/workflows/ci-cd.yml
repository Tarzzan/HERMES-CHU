name: HERMES CHU — CI/CD Sécurisée

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_ORCHESTRATEUR: ghcr.io/${{ github.repository_owner }}/hermes-orchestrateur
  IMAGE_PRIVACY: ghcr.io/${{ github.repository_owner }}/hermes-privacy-engine
  IMAGE_WEB_UI: ghcr.io/${{ github.repository_owner }}/hermes-web-ui

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Lint & Format
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configuration Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Installation des outils de lint
        run: pip install ruff black isort mypy

      - name: Ruff (linting Python)
        run: ruff check src/

      - name: Black (formatage Python)
        run: black --check src/

      - name: isort (ordre des imports)
        run: isort --check-only src/

      - name: Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint TypeScript/React
        working-directory: src/web-ui
        run: |
          npm ci
          npm run lint

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Tests Unitaires
  # ──────────────────────────────────────────────────────────────────────────
  tests:
    name: Tests Unitaires
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: hermes_test
          POSTGRES_DB: hermes_audit_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configuration Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Installation des dépendances
        run: |
          pip install -r src/orchestrator/requirements.txt
          pip install -r src/privacy-engine/requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Tests Orchestrateur
        env:
          REDIS_URL: redis://localhost:6379/0
          POSTGRES_URL: postgresql://hermes:hermes_test@localhost:5432/hermes_audit_test
          ENVIRONMENT: test
        run: |
          pytest tests/orchestrator/ -v --cov=src/orchestrator --cov-report=xml

      - name: Tests Privacy Engine
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/privacy-engine/ -v --cov=src/privacy-engine --cov-report=xml

      - name: Vérification de la couverture (>80%)
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().attrib['line-rate']) * 100
          print(f'Couverture: {rate:.1f}%')
          assert rate >= 80, f'Couverture insuffisante: {rate:.1f}% < 80%'
          "

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Analyse de Sécurité Statique (SAST)
  # ──────────────────────────────────────────────────────────────────────────
  sast:
    name: Analyse SAST
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep (SAST Python)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/security-audit
            p/owasp-top-ten
            p/secrets

      - name: Gitleaks (détection de secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bandit (sécurité Python)
        run: |
          pip install bandit
          bandit -r src/ -f json -o bandit-report.json || true
          python -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
          critiques = [i for i in data.get('results', []) if i['issue_severity'] == 'HIGH']
          if critiques:
              print(f'ERREUR: {len(critiques)} vulnérabilité(s) critique(s) détectée(s)')
              for c in critiques:
                  print(f'  - {c[\"issue_text\"]} ({c[\"filename\"]}:{c[\"line_number\"]})')
              exit(1)
          print('Aucune vulnérabilité critique détectée.')
          "

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Build & Scan des Images Docker
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Scan Docker
    runs-on: ubuntu-latest
    needs: [tests, sast]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Connexion au registre
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image Orchestrateur
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/orchestrator.Dockerfile
          push: false
          tags: ${{ env.IMAGE_ORCHESTRATEUR }}:${{ github.sha }}
          load: true

      - name: Trivy — Scan vulnérabilités Orchestrateur
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_ORCHESTRATEUR }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Build image Privacy Engine
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/privacy-engine.Dockerfile
          push: false
          tags: ${{ env.IMAGE_PRIVACY }}:${{ github.sha }}
          load: true

      - name: Trivy — Scan vulnérabilités Privacy Engine
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PRIVACY }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Push images (main uniquement)
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.IMAGE_ORCHESTRATEUR }}:${{ github.sha }}
          docker push ${{ env.IMAGE_ORCHESTRATEUR }}:latest
          docker push ${{ env.IMAGE_PRIVACY }}:${{ github.sha }}
          docker push ${{ env.IMAGE_PRIVACY }}:latest

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Déploiement Staging (automatique sur main)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Déploiement Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://hermes-staging.chu-interne.local
    steps:
      - uses: actions/checkout@v4

      - name: Configuration kubectl
        uses: azure/setup-kubectl@v3

      - name: Déploiement Kubernetes (Staging)
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl set image deployment/hermes-orchestrateur \
            orchestrateur=${{ env.IMAGE_ORCHESTRATEUR }}:${{ github.sha }} \
            -n hermes-staging
          kubectl rollout status deployment/hermes-orchestrateur -n hermes-staging --timeout=5m

  # ──────────────────────────────────────────────────────────────────────────
  # 6. Déploiement Production (manuel — approbation RSSI requise)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://hermes.chu-interne.local
    steps:
      - uses: actions/checkout@v4

      - name: Configuration kubectl
        uses: azure/setup-kubectl@v3

      - name: Déploiement Kubernetes (Production)
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PRODUCTION }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl set image deployment/hermes-orchestrateur \
            orchestrateur=${{ env.IMAGE_ORCHESTRATEUR }}:${{ github.sha }} \
            -n hermes-production
          kubectl rollout status deployment/hermes-orchestrateur -n hermes-production --timeout=10m
