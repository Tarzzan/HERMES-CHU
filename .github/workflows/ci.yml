# PULSAR (HERMES CHU) — Intégration continue
# Exigence ISO 27001 A.14 : tests automatisés sur chaque commit et pull request.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests-python:
    name: Tests unitaires Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances de test
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio fastapi uvicorn pydantic httpx pyyaml

      - name: Compiler tous les fichiers Python (chu/, src/, tests/)
        run: |
          find chu src tests -name "*.py" -exec python -m py_compile {} +

      - name: Tests unitaires — Orchestrateur
        run: python -m pytest tests/orchestrator -v

      - name: Tests unitaires — Privacy Engine
        run: python -m pytest tests/privacy-engine -v

      - name: Vérifier le démarrage des serveurs API
        run: |
          python - <<'EOF'
          import importlib.util

          def charger(nom, chemin):
              spec = importlib.util.spec_from_file_location(nom, chemin)
              module = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(module)
              return module

          serveur = charger("serveur", "src/orchestrator/serveur.py")
          assert len(serveur.app.routes) > 0
          serveur_chu = charger("serveur_chu", "chu/api/serveur_chu.py")
          chemins = [r.path for r in serveur_chu.app.routes if hasattr(r, "path")]
          for endpoint in ("/api/chu/metriques", "/api/chu/anonymisation/stats", "/api/chu/insights"):
              assert endpoint in chemins, f"Endpoint manquant : {endpoint}"
          print("Serveurs API : OK")
          EOF

  syntaxe-desktop:
    name: Syntaxe Electron (chu-desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Vérifier la syntaxe des modules Electron
        run: |
          node --check chu-desktop/electron/chu-ipc.cjs
          node --check chu-desktop/electron/chu-preload.cjs
