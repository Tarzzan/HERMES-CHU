    - "(⚕)"
    - "( o)"
    - "(o )"
    - "( . )"
    - "(⚕)"
  thinking_verbs:
    - "Analyse clinique"
    - "Consultation"
    - "Traitement"
    - "Verification"
    - "Synthese"
    - "Coordination"
    - "Vigilance"
    - "Impulsion"

