    - "(⚕)"
    - "(◉)"
    - "(⊙)"
    - "(◎)"
    - "(⚕)"
  thinking_verbs:
    - "Analyse en cours"
    - "Traitement medical"
    - "Consultation agents"
    - "Verification donnees"
    - "Synthese clinique"
    - "Orchestration"
    - "Vigilance active"
    - "Impulsion PULSAR"

