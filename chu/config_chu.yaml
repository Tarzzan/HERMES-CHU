# ============================================================
# HERMES CHU — Configuration Hospitalière
# Surcouche de configuration sur hermes-agent (NousResearch)
# Conforme ISO 27001 / HDS / RGPD
# ============================================================

# --- Identité du déploiement ---
chu:
  nom: "CHU de [Votre Établissement]"
  finess: ""                          # Numéro FINESS à renseigner
  environnement: "developpement"      # developpement | recette | production
  version: "1.0.0"
  langue: "fr"

# --- Configuration LLM (hérite du système hermes-agent) ---
# Sélectionner le fournisseur selon l'environnement :
#   POC/Développement  → Azure OpenAI ou OpenAI (données anonymisées via Privacy Engine)
#   Production         → vLLM local avec Hermes-3-70B (souverain, on-premise)
#
# Le Privacy Engine RGPD garantit qu'aucune donnée PHI n'atteint un LLM tiers.

llm:
  # Fournisseur actif : azure_openai | openai | openai_codex | nous | ollama | vllm | openrouter
  #
  # openai_codex  → ChatGPT via abonnement (Plus/Team/Enterprise)
  #                  Flux OAuth device_code : un code OTP s'affiche dans l'UI,
  #                  l'utilisateur le saisit sur chatgpt.com/link.
  #                  Aucune clé API requise. Géré nativement par hermes-agent.
  #
  # nous           → Nous Portal (Hermes natif, même flux device_code)
  #
  fournisseur_actif: "azure_openai"

  azure_openai:
    # Authentification : api_key (POC) ou entra_id (production Azure)
    auth_mode: "api_key"              # api_key | entra_id
    api_key: "${AZURE_OPENAI_API_KEY}"
    endpoint: "${AZURE_OPENAI_ENDPOINT}"
    deployment: "gpt-4o"
    api_version: "2024-02-01"
    # Pour auth Entra ID (Managed Identity) :
    # auth_mode: "entra_id"
    # entra:
    #   scope: "https://cognitiveservices.azure.com/.default"

  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o"

  ollama:
    base_url: "http://localhost:11434"
    model: "hermes3:70b"              # ou llama3.1:70b, mistral:7b pour le POC

  vllm:
    # Déploiement on-premise souverain (production CHU)
    base_url: "http://vllm-service:8000/v1"
    model: "NousResearch/Hermes-3-Llama-3.1-70B-Instruct"
    api_key: "${VLLM_API_KEY}"

  openrouter:
    api_key: "${OPENROUTER_API_KEY}"
    model: "nousresearch/hermes-3-llama-3.1-70b"

  # ChatGPT via abonnement (Plus / Team / Enterprise)
  # Flux OAuth device_code natif hermes-agent :
  #   1. hermes-agent appelle l'endpoint OAuth ChatGPT
  #   2. Un code OTP (ex: ABCD-1234) est retourné et affiché dans l'UI
  #   3. L'utilisateur se rend sur chatgpt.com/link et saisit ce code
  #   4. hermes-agent poll jusqu'à validation et stocke le JWT dans ~/.hermes/auth.json
  #   5. Toutes les requêtes passent par chatgpt.com/backend-api/codex
  # Aucune configuration manuelle requise — tout est géré par hermes-agent.
  openai_codex:
    # Identifiant du provider dans hermes-agent
    provider_id: "openai-codex"
    # Modèles disponibles selon l'abonnement :
    #   Plus      → gpt-4o, o1, o3-mini
    #   Team      → gpt-4o, o1, o3
    #   Enterprise → gpt-4o, o1, o3, GPT-5 (si disponible)
    model: "gpt-4o"
    # Note RGPD : le Privacy Engine anonymise AVANT envoi à ChatGPT
    # Les données PHI ne transitent jamais en clair vers OpenAI
    privacy_engine_obligatoire: true

  # Nous Portal (Hermes natif)
  # Même flux OAuth device_code que ChatGPT
  nous:
    provider_id: "nous"
    model: "Hermes-3-Llama-3.1-70B-Instruct"
    privacy_engine_obligatoire: false  # Hébergement NousResearch (hors UE — activer selon politique CHU)

# --- Privacy Engine RGPD ---
privacy_engine:
  # Activation globale (true = anonymisation active par défaut)
  actif: true

  # Mode glass-break : permet la désactivation temporaire avec justification tracée
  glass_break:
    autorise: true
    duree_max_minutes: 60
    roles_autorises:
      - "MEDECIN_SENIOR"
      - "RSSI"
      - "DPO"

  # Entités PHI à détecter et anonymiser
  entites_phi:
    - "NOM_PATIENT"
    - "PRENOM_PATIENT"
    - "DATE_NAISSANCE"
    - "NIR"                           # Numéro de Sécurité Sociale
    - "IPP"                           # Identifiant Permanent du Patient
    - "ADRESSE"
    - "TELEPHONE"
    - "EMAIL"
    - "NOM_MEDECIN"
    - "NUMERO_SEJOUR"

  # Backend NER (pour le POC, utiliser regex ; pour la production, spacy/camembert)
  backend_ner: "regex"                # regex | spacy | camembert_bio

  # Redis pour la table de correspondance token ↔ PHI réel
  redis:
    url: "${REDIS_URL:-redis://localhost:6379}"
    ttl_secondes: 3600
    chiffrement: true

# --- Garde-fous (extensions des outils hermes-agent) ---
garde_fous:
  # Niveau 1 : Validation des entrées
  validation_entrees:
    actif: true
    longueur_max_tokens: 8192
    detection_injection_prompt: true
    blocage_phi_brut: true            # Bloque si PHI détecté et anonymisation désactivée

  # Niveau 2 : Restriction des outils par rôle
  restriction_outils:
    actif: true
    # Les outils système dangereux sont désactivés en contexte CHU
    outils_bloques_chu:
      - "shell"
      - "computer"
      - "browser"

  # Niveau 3 : Contrôle des sorties
  controle_sorties:
    actif: true
    rescan_phi_sortie: true           # Re-scan NER sur chaque réponse LLM

  # Niveau 4 : Exécution bornée
  execution_bornee:
    iterations_max: 10
    timeout_secondes: 60
    tokens_max_par_requete: 8192

# --- Agents CHU spécialisés (skills hermes-agent) ---
# Ces agents sont implémentés comme des "skills" hermes-agent
# Voir upstream/hermes-agent/tools/skills/ pour le format
agents_chu:
  clinique:
    actif: true
    skill_file: "chu/skills/agent_clinique.md"
    roles_autorises: ["MEDECIN", "INFIRMIER", "SAGE_FEMME"]

  administratif:
    actif: true
    skill_file: "chu/skills/agent_administratif.md"
    roles_autorises: ["SECRETAIRE", "CADRE_SANTE", "DIRECTION"]

  logistique:
    actif: true
    skill_file: "chu/skills/agent_logistique.md"
    roles_autorises: ["PHARMACIEN", "LOGISTICIEN", "CADRE_SANTE"]

  recherche:
    actif: true
    skill_file: "chu/skills/agent_recherche.md"
    roles_autorises: ["MEDECIN", "CHERCHEUR", "ARC"]

  qualite:
    actif: true
    skill_file: "chu/skills/agent_qualite.md"
    roles_autorises: ["RESPONSABLE_QUALITE", "DIRECTION", "RSSI"]

# --- Journalisation et audit ISO 27001 ---
audit:
  actif: true
  backend: "postgresql"               # postgresql | fichier
  database_url: "${DATABASE_URL}"
  # Chaque événement est hashé SHA-256 pour garantir l'immuabilité
  hash_chaine: true
  # Événements à journaliser
  evenements:
    - "connexion_utilisateur"
    - "deconnexion_utilisateur"
    - "requete_llm"
    - "activation_glass_break"
    - "desactivation_anonymisation"
    - "acces_donnee_sensible"
    - "erreur_garde_fou"
    - "changement_configuration_llm"

# --- Intégration SIH (pour la production) ---
sih:
  fhir:
    actif: false                      # Activer en production
    base_url: "${FHIR_BASE_URL}"
    version: "R4"
    auth:
      type: "oauth2"
      token_url: "${FHIR_TOKEN_URL}"
      client_id: "${FHIR_CLIENT_ID}"
      client_secret: "${FHIR_CLIENT_SECRET}"

# ============================================================
# --- Mémoire persistante et apprentissage continu ---
# Hermes-agent dispose d'un système d'apprentissage en 6 mécanismes.
# Cette section configure leur comportement dans le contexte CHU.
# ============================================================

memoire:
  # -------------------------------------------------------
  # 1. BACKGROUND REVIEW (background_review.py)
  # -------------------------------------------------------
  # Après chaque échange, un agent "fantôme" rejoue la conversation
  # et décide automatiquement de sauvegarder des informations en mémoire
  # ou de mettre à jour les skills.
  # IMPORTANT CHU : le Privacy Engine s'applique AVANT toute écriture
  # en mémoire — aucun PHI ne persiste en clair.
  background_review:
    actif: true
    # Délai avant déclenchement (secondes après la fin du tour)
    delai_secondes: 2
    # Le Background Review utilise un modèle auxiliaire léger (moins coûteux)
    # Recommandation CHU : même provider que le LLM principal mais modèle rapide
    modele_auxiliaire: "gpt-4o-mini"    # ou "gpt-3.5-turbo", "mistral:7b"
    # Filtrage PHI avant écriture mémoire (obligatoire CHU)
    filtrage_phi_avant_ecriture: true

  # -------------------------------------------------------
  # 2. MEMORY MANAGER — Plugin mémoire (memory_manager.py)
  # -------------------------------------------------------
  # Gère la mémoire persistante inter-sessions.
  # Un seul plugin externe peut être actif à la fois.
  #
  # Recommandations CHU par environnement :
  #   POC/Dev     → builtin (mémoire locale SQLite, aucune dépendance externe)
  #   Production  → mem0 (vecteurs locaux) ou holographic (RAG sémantique)
  #   Cloud       → honcho (SaaS, données anonymisées uniquement)
  #
  # Plugins disponibles (upstream/hermes-agent/plugins/memory/) :
  #   builtin     → Mémoire locale SQLite intégrée à hermes-agent (défaut)
  #   mem0        → Mémoire vectorielle (Qdrant/Chroma local ou cloud)
  #   holographic → RAG sémantique avec retrieval hybride (BM25 + vecteurs)
  #   honcho      → SaaS de mémoire personnalisée (données anonymisées obligatoires)
  #   hindsight   → Extraction automatique de faits depuis les conversations
  #   byterover   → Mémoire distribuée avec indexation sémantique
  #   retaindb    → Base de données de rétention structurée
  #   supermemory → Mémoire augmentée avec graphe de connaissances
  #   openviking  → Mémoire open-source auto-hébergeable
  plugin_actif: "builtin"              # builtin | mem0 | holographic | honcho | hindsight | ...

  # Configuration du plugin builtin (SQLite local)
  builtin:
    # Chemin du fichier SQLite (relatif au répertoire hermes-agent)
    db_path: "~/.hermes/memory_chu.db"
    # Nombre maximum de souvenirs stockés par utilisateur
    max_souvenirs: 500
    # Durée de rétention des souvenirs (jours, 0 = illimité)
    retention_jours: 365

  # Configuration mem0 (vectoriel local — recommandé production)
  mem0:
    # Endpoint mem0 local (docker run mem0/mem0:latest)
    api_url: "${MEM0_API_URL:-http://localhost:8765}"
    api_key: "${MEM0_API_KEY}"
    # Modèle d'embedding (local ou Azure)
    embedding_model: "text-embedding-3-small"
    # Collection dédiée CHU
    collection: "hermes_chu_memory"

  # Configuration holographic (RAG sémantique — recommandé production souveraine)
  holographic:
    # Répertoire de stockage local
    store_path: "~/.hermes/holographic_chu/"
    # Modèle d'embedding local (via Ollama)
    embedding_model: "nomic-embed-text"
    # Taille des chunks
    chunk_size: 512
    top_k: 10

  # Configuration honcho (SaaS — POC cloud uniquement, données anonymisées)
  honcho:
    api_key: "${HONCHO_API_KEY}"
    # AVERTISSEMENT : n'utiliser qu'avec Privacy Engine actif
    # Aucune donnée PHI ne doit transiter vers Honcho
    privacy_engine_obligatoire: true

  # -------------------------------------------------------
  # 3. CURATOR — Amélioration continue des skills (curator.py)
  # -------------------------------------------------------
  # Processus de fond qui consolide, archive et améliore les skills
  # au fil du temps. Analyse les patterns d'usage et met à jour
  # automatiquement les SKILL.md des agents CHU.
  curator:
    actif: true
    # Fréquence d'exécution (heures)
    frequence_heures: 24
    # Le Curator peut modifier les skills CHU (agent_clinique.md, etc.)
    # mais ne peut PAS modifier les skills NousResearch (bundled)
    skills_modifiables:
      - "chu/skills/agent_clinique.md"
      - "chu/skills/agent_administratif.md"
      - "chu/skills/agent_logistique.md"
      - "chu/skills/agent_recherche.md"
      - "chu/skills/agent_qualite.md"
      - "chu/skills/agent_formation.md"
    # Skills protégés (jamais modifiés par le Curator)
    skills_proteges:
      - "upstream/pulsar-agent/**"      # Tous les skills du moteur upstream
    # Seuil de confiance pour une mise à jour automatique (0.0 à 1.0)
    seuil_confiance: 0.8
    # Journaliser chaque modification du Curator
    journaliser_modifications: true

  # -------------------------------------------------------
  # 4. TRAJECTORY SAVING — Fine-tuning futur (trajectory.py)
  # -------------------------------------------------------
  # Sauvegarde chaque conversation au format ShareGPT (JSONL)
  # pour permettre le fine-tuning futur du modèle Hermes sur
  # les cas d'usage CHU spécifiques.
  # IMPORTANT : les trajectoires sont anonymisées avant sauvegarde.
  trajectoires:
    actif: true
    # Répertoire de sauvegarde
    repertoire: "~/.hermes/trajectoires_chu/"
    # Fichier des trajectoires réussies
    fichier_succes: "trajectoires_reussies.jsonl"
    # Fichier des trajectoires échouées (pour analyse)
    fichier_echecs: "trajectoires_echecs.jsonl"
    # Anonymisation obligatoire avant sauvegarde
    anonymiser_avant_sauvegarde: true
    # Conserver uniquement les conversations avec feedback positif
    filtre_qualite: true
    # Durée de rétention (jours)
    retention_jours: 730                # 2 ans (conformité HDS)

  # -------------------------------------------------------
  # 5. INSIGHTS ENGINE — Analyse d'usage (insights.py)
  # -------------------------------------------------------
  # Analyse les sessions historiques pour produire des rapports
  # d'usage : tokens consommés, coûts estimés, patterns d'outils,
  # tendances d'activité, répartition par modèle/provider.
  # Ces insights alimentent le tableau de bord du service qualité.
  insights:
    actif: true
    # Période d'analyse par défaut (jours)
    periode_defaut_jours: 30
    # Exporter les insights vers l'API Qualité CHU
    export_api_qualite: true
    # Endpoint de l'API Qualité (serveur_chu.py)
    api_qualite_url: "http://localhost:8001/api/chu/insights"
    # Fréquence de génération automatique (heures)
    frequence_heures: 24

  # -------------------------------------------------------
  # 6. CONTEXT COMPRESSION — Gestion du contexte (context_compressor.py)
  # -------------------------------------------------------
  # Compression intelligente du contexte avec résumé structuré
  # (Resolved/Pending) quand la fenêtre de contexte approche sa limite.
  # Utilise un modèle auxiliaire léger pour la compression.
  compression_contexte:
    actif: true
    # Seuil de déclenchement (% de la fenêtre de contexte)
    seuil_declenchement_pct: 80
    # Modèle auxiliaire pour la compression (léger et rapide)
    modele_auxiliaire: "gpt-4o-mini"
    # Protéger les N derniers messages (ne pas compresser la fin)
    messages_proteges_fin: 10
    # Inclure un résumé structuré (Résolu / En cours / En attente)
    resume_structure: true

# ============================================================
# --- Politique de rétention des données (RGPD / HDS) ---
# ============================================================
retention_donnees:
  # Conversations (sessions SQLite hermes-agent)
  conversations:
    duree_jours: 90                     # 3 mois par défaut
    anonymiser_a_expiration: true       # Anonymiser plutôt que supprimer
    purger_phi_immediat: false          # Purge immédiate des PHI si true

  # Journaux d'audit ISO 27001
  journaux_audit:
    duree_jours: 3650                   # 10 ans (exigence HDS)
    archivage_chiffre: true

  # Mémoire persistante
  memoire_persistante:
    duree_jours: 365                    # 1 an
    revue_annuelle: true                # Rappel de revue annuelle

  # Trajectoires de fine-tuning
  trajectoires:
    duree_jours: 730                    # 2 ans
    anonymisation_complete: true        # Vérification PHI avant archivage
